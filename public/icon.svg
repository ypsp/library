<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book icon -->
  <g transform="translate(256, 256)">
    <!-- Open book pages -->
    <path d="M-120 -80 Q-120 -100 -100 -100 L-20 -100 Q0 -100 0 -80 L0 100 Q0 120 -20 120 L-100 120 Q-120 120 -120 100 Z" fill="#fff" opacity="0.95"/>
    <path d="M120 -80 Q120 -100 100 -100 L20 -100 Q0 -100 0 -80 L0 100 Q0 120 20 120 L100 120 Q120 120 120 100 Z" fill="#fff" opacity="0.9"/>
    <!-- Book spine -->
    <rect x="-8" y="-100" width="16" height="220" rx="4" fill="#e0e7ff"/>
    <!-- Lines on left page -->
    <rect x="-100" y="-60" width="60" height="8" rx="4" fill="#c7d2fe"/>
    <rect x="-100" y="-40" width="70" height="8" rx="4" fill="#c7d2fe"/>
    <rect x="-100" y="-20" width="50" height="8" rx="4" fill="#c7d2fe"/>
    <rect x="-100" y="0" width="65" height="8" rx="4" fill="#c7d2fe"/>
    <!-- Lines on right page -->
    <rect x="40" y="-60" width="60" height="8" rx="4" fill="#c7d2fe"/>
    <rect x="30" y="-40" width="70" height="8" rx="4" fill="#c7d2fe"/>
    <rect x="50" y="-20" width="50" height="8" rx="4" fill="#c7d2fe"/>
    <rect x="35" y="0" width="65" height="8" rx="4" fill="#c7d2fe"/>
    <!-- Calendar mark -->
    <circle cx="60" cy="60" r="35" fill="#10b981"/>
    <text x="60" y="72" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#fff" text-anchor="middle">✓</text>
  </g>
</svg>
