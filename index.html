<!DOCTYPE html>
<html lang="ja" style="background-color: #0f172a;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="図書館" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" href="/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
    <title>Library Calendar | 図書館開館状況</title>
    <style>
        /* 即座に背景色を適用して白い画面を回避 */
        html, body {
            background-color: #0f172a;
            margin: 0;
            padding: 0;
        }
        body {
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: env(safe-area-inset-top) 20px 40px;
            padding-top: max(env(safe-area-inset-top), 12px);
        }
        /* スケルトンUI用 */
        .skeleton-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        .skeleton-card {
            height: 64px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.7; }
            100% { opacity: 0.4; }
        }
        #quick-links > div {
            display: flex;
            gap: 8px;
        }
        #quick-links > div > div {
            height: 48px;
            flex: 1;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 14px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600&display=swap"></noscript>
</head>

<body>
    <div class="container">
        <header>
            <h1 style="margin: 32px 0 24px; font-size: 1.8rem; font-weight: 700; color: #f8fafc;">図書館カレンダー</h1>
        </header>

        <div class="calendar-trigger" id="datepicker-btn">
            <span>📅</span>
            <span id="selected-date-display">読み込み中...</span>
            <input type="date" id="date-input-hidden">
        </div>

        <div class="date-selector" id="quick-links">
            <!-- Loading placeholders -->
            <div style="display: flex; gap: 8px;">
                <div style="height: 48px; flex: 1; background: var(--card-bg); border-radius: 12px;"></div>
                <div style="height: 48px; flex: 1; background: var(--card-bg); border-radius: 12px;"></div>
                <div style="height: 48px; flex: 1; background: var(--card-bg); border-radius: 12px;"></div>
            </div>
        </div>

        <div class="library-list" id="library-list">
            <!-- スケルトンUI: JSが実行されるまでのプレースホルダー -->
            <div class="skeleton-list">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>

        <div style="text-align: right; margin-top: 20px;">
            <a href="edit.html" style="text-decoration: none; color: #64748b; font-size: 1.2rem; opacity: 0.5; transition: opacity 0.2s;" title="カレンダー編集">⚙️</a>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
