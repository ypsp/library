<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="図書館" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Library Calendar | 図書館開館状況</title>
    <style>
        /* CSSが読み込まれる前に背景をセットして真っ白を回避 */
        body {
            background-color: #0f172a;
            margin: 0;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>図書館カレンダー</h1>
        </header>

        <div class="calendar-trigger" id="datepicker-btn">
            <span>📅</span>
            <span id="selected-date-display">日付を選択</span>
            <input type="date" id="date-input-hidden">
        </div>

        <div class="date-selector" id="quick-links">
            <!-- Dynamic quick links like "Today", "Tomorrow" -->
        </div>

        <div class="library-list" id="library-list">
            <!-- Library cards will be injected here -->
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
