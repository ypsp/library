<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="図書館" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Library Calendar | 図書館開館状況</title>
    <style>
        /* CSSが読み込まれる前に背景をセットして真っ白を回避 */
        :root {
            --bg-deep: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        body {
            background-color: var(--bg-deep);
            margin: 0;
            color: #f8fafc;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: env(safe-area-inset-top) 20px 40px;
        }
        /* スケルトンUI用 */
        .skeleton-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        .skeleton-card {
            height: 90px;
            background: var(--card-bg);
            border-radius: 16px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.7; }
            100% { opacity: 0.4; }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600&display=swap"></noscript>
</head>

<body>
    <div class="container">
        <header>
            <h1 style="margin: 32px 0 24px; font-size: 1.8rem; font-weight: 700; color: #f8fafc;">図書館カレンダー</h1>
        </header>

        <div class="calendar-trigger" id="datepicker-btn">
            <span>📅</span>
            <span id="selected-date-display">読み込み中...</span>
            <input type="date" id="date-input-hidden">
        </div>

        <div class="date-selector" id="quick-links">
            <!-- Loading placeholders -->
            <div style="display: flex; gap: 8px;">
                <div style="height: 48px; flex: 1; background: var(--card-bg); border-radius: 12px;"></div>
                <div style="height: 48px; flex: 1; background: var(--card-bg); border-radius: 12px;"></div>
                <div style="height: 48px; flex: 1; background: var(--card-bg); border-radius: 12px;"></div>
            </div>
        </div>

        <div class="library-list" id="library-list">
            <!-- スケルトンUI: JSが実行されるまでのプレースホルダー -->
            <div class="skeleton-list">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>

        <div style="text-align: right; margin-top: 20px;">
            <a href="edit.html" style="text-decoration: none; color: #64748b; font-size: 1.2rem; opacity: 0.5; transition: opacity 0.2s;" title="カレンダー編集">⚙️</a>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
